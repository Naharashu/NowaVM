site_name: NowaVM Docs

site_description: "Official documentation for NowaVM"
repo_url: "https://github.com/Naharashu/NowaVM"

theme:
  name: readthedocs
  user_color_mode_toggle: true
  highlightjs: true
  highlight_css: atom-one-dark.min.css
  hljs_languages:
    - bash
    - shell
    - plaintext

markdown_extensions:
  - fenced_code

nav:
  - Home: index.md

  - Assembly:
      - ISA: assembly/isa.md
      - Registers: assembly/registers.md

  - VM:
      - VM: vm/vm.md

  - Linker:
      - Linker: linker/linker.md
